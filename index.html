<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conferência MDF-e</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
</head>

<body style="font-family: Arial; padding:20px;">

<h2>Conferência MDF-e x Relatório</h2>

<p>XML do MDF-e:</p>
<input type="file" id="xmlFile">

<p>PDF do relatório:</p>
<input type="file" id="pdfFile">

<br><br> <button onclick="analisar()">CONFERIR</button>

<h3>Resultado:</h3>
<pre id="resultado"></pre>

<script>
async function lerPDF(file){
  const pdfjsLib = window['pdfjsLib'];
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js';

  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buffer}).promise;

  let texto = "";

  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    texto += content.items.map(item=>item.str).join(" ");
  }

  return texto;
}

function pegarNumero(texto, label){
  const regex = new RegExp(label + ".*?(\\d+[.,]\\d+)", "i");
  const match = texto.match(regex);
  return match ? match[1] : "não encontrado";
}

async function analisar(){
  const xmlFile = document.getElementById('xmlFile').files[0];
  const pdfFile = document.getElementById('pdfFile').files[0];

  if(!xmlFile || !pdfFile){
    alert("Anexa os dois arquivos");
    return;
  }

  const xmlText = await xmlFile.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, "text/xml");

  const vCarga = xml.getElementsByTagName("vCarga")[0]?.textContent;

  const pdfText = await lerPDF(pdfFile);

  const frete = pegarNumero(pdfText, "Valor do Frete");
  const notas = pegarNumero(pdfText, "Valor Total das Notas");

  document.getElementById("resultado").innerText =
    "Valor carga XML: " + vCarga + "\\n" +
    "Frete relatório: " + frete + "\\n" +
    "Total notas: " + notas + "\\n\\n" +
    (vCarga == notas.replace(".", "").replace(",", ".")
      ? "✅ CARGA CONFERE"
      : "❌ DIVERGÊNCIA");
}
</script>

</body>
</html>
